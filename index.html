<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Eco Nativo Pro - Control de Bucle</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-idle: #0a0a0a;
            --color-driver: #fbbf24; 
            --color-client: #38bdf8; 
            --btn-start: #38bdf8;
            --btn-stop: #ef4444; 
        }

        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        
        body { 
            background-color: var(--bg-idle); color: white; margin: 0; 
            display: flex; flex-direction: column; 
            height: 100vh; height: 100dvh; overflow: hidden;
            transition: background-color 0.4s ease;
        }

        body.mode-driver { background-color: #2b1d00; } 
        body.mode-client { background-color: #001a35; } 
        body.mode-idle { background-color: var(--bg-idle); }

        header { 
            padding: calc(20px + env(safe-area-inset-top)) 20px 10px; 
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.3); z-index: 10;
        }

        .medbasha-sign { font-size: 8px; letter-spacing: 2px; opacity: 0.4; font-weight: bold; }
        .toponym-shield { font-size: 9px; color: #22c55e; font-weight: 800; }

        .display-area {
            flex: 1; display: flex; flex-direction: column; justify-content: center; 
            padding: 20px; text-align: center;
        }
        #main-display { font-size: 42px; font-weight: 900; line-height: 1.1; }
        #sub-display { font-size: 18px; margin-top: 20px; min-height: 1.5em; color: #94a3b8; }

        .quick-actions-container {
            padding: 5px 0; background: rgba(0,0,0,0.4); border-top: 1px solid rgba(255,255,255,0.1);
        }
        .quick-actions { display: flex; gap: 8px; overflow-x: auto; padding: 10px 20px; scrollbar-width: none; }
        .q-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
            color: white; padding: 12px 18px; border-radius: 12px; white-space: nowrap; font-size: 13px; font-weight: 700;
        }

        .control-panel {
            background: #1e293b;
            padding: 15px 25px calc(65px + env(safe-area-inset-bottom)); 
            border-radius: 35px 35px 0 0;
            box-shadow: 0 -15px 50px rgba(0,0,0,0.9);
            z-index: 100;
        }

        .lang-selector { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; align-items: center; }
        .l-flag { font-size: 28px; background: none; border: 2px solid transparent; cursor: pointer; filter: grayscale(1); transition: 0.2s; border-radius: 50%; }
        .l-flag.active { filter: grayscale(0); transform: scale(1.2); border-color: var(--color-client); }
        
        .btn-auto-detect {
            background: #22c55e; color: white; border: none; padding: 8px 14px;
            border-radius: 10px; font-size: 10px; font-weight: 900; cursor: pointer;
            text-transform: uppercase;
        }
        .btn-auto-detect.active { box-shadow: 0 0 20px #22c55e; border: 2px solid white; }

        .master-btn {
            width: 100%; padding: 22px; border-radius: 18px; border: none;
            font-size: 17px; font-weight: 900; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-start { background: var(--btn-start); color: white; }
        .btn-stop { background: var(--btn-stop); color: white; }

        .txt-driver { color: var(--color-driver); }
        .txt-client { color: var(--color-client); }
    </style>
</head>
<body id="app-body" class="mode-idle">

    <header>
        <div>
            <div style="font-weight: 900; font-size: 12px;">ECO NATIVO <span style="color:var(--color-client)">PRO</span></div>
            <div class="toponym-shield">🛡️ ANTI-LOOP ACTIVATED</div>
        </div>
        <div class="medbasha-sign">MEDBASHA</div>
    </header>

    <div class="display-area">
        <div id="main-display">REPOSO</div>
        <div id="sub-display">Fidelidad IA activa</div>
    </div>

    <div class="quick-actions-container">
        <div class="quick-actions">
            <button class="q-btn" onclick="forcePhrase('Hola, buenos días. ¿A qué hotel o urbanización vamos?')">👋 Bienvenida</button>
            <button class="q-btn" onclick="forcePhrase('Hay algo de tráfico en la carretera principal, tardaremos unos minutos más')">🚗 Tráfico</button>
            <button class="q-btn" onclick="forcePhrase('¿Le parece bien la temperatura del coche?')">🌡️ Temp.</button>
            <button class="q-btn" onclick="forcePhrase('¿Desea pagar con tarjeta o efectivo?')">💳 Pago</button>
        </div>
    </div>

    <div class="control-panel">
        <div class="lang-selector">
            <button class="l-flag active" id="flag-en" onclick="setLang('en', this)">🇬🇧</button>
            <button class="l-flag" id="flag-fr" onclick="setLang('fr', this)">🇫🇷</button>
            <button class="l-flag" id="flag-de" onclick="setLang('de', this)">🇩🇪</button>
            <button class="l-flag" id="flag-it" onclick="setLang('it', this)">🇮🇹</button>
            <button class="btn-auto-detect" id="btn-auto" onclick="enableAutoDetect()">Auto ✨</button>
        </div>

        <button id="master-btn" class="master-btn btn-start" onclick="toggleSystem()">
            🎤 ACTIVAR ASISTENTE
        </button>
    </div>

    <script>
        let isRunning = false;
        let isAutoDetect = false;
        let isProcessing = false; // BLOQUEO PARA EVITAR BUCLES
        let turn = 'driver'; 
        let targetLang = 'en';
        let autoStopTimer = null;
        const AUTO_STOP_TIME = 180000; // 3 MINUTOS

        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.continuous = false;
        rec.interimResults = true; 

        function setLang(l, el) {
            targetLang = l; isAutoDetect = false;
            document.getElementById('btn-auto').classList.remove('active');
            document.querySelectorAll('.l-flag').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function enableAutoDetect() {
            isAutoDetect = true;
            document.querySelectorAll('.l-flag').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-auto').classList.add('active');
        }

        function toggleSystem() {
            isRunning = !isRunning;
            const btn = document.getElementById('master-btn');
            if(isRunning) {
                btn.innerText = "🛑 DETENER SISTEMA";
                btn.classList.replace('btn-start', 'btn-stop');
                resetAutoStopTimer();
                turn = 'driver';
                startCycle();
            } else {
                btn.innerText = "🎤 ACTIVAR ASISTENTE";
                btn.classList.replace('btn-stop', 'btn-start');
                stopSystem();
            }
        }

        function stopSystem() {
            isRunning = false; isProcessing = false;
            rec.stop();
            window.speechSynthesis.cancel();
            clearTimeout(autoStopTimer);
            updateUI("SISTEMA APAGADO", "Presione Activar", "idle");
        }

        function resetAutoStopTimer() {
            clearTimeout(autoStopTimer);
            if (isRunning) autoStopTimer = setTimeout(() => { if(isRunning) toggleSystem(); }, AUTO_STOP_TIME);
        }

        async function startCycle() {
            if(!isRunning || isProcessing || window.speechSynthesis.speaking) return;

            const isDriver = turn === 'driver';
            rec.lang = isDriver ? 'es-ES' : (isAutoDetect ? 'en-GB' : getFullCode(targetLang));
            
            updateUI(
                isDriver ? "CONDUCTOR..." : "PASAJERO...", 
                isDriver ? "Escuchando..." : "Listening...",
                isDriver ? "driver" : "client"
            );
            
            try { rec.start(); } catch(e) {}
        }

        rec.onresult = async (event) => {
            resetAutoStopTimer();
            let interim = '';
            let final = '';

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) final += event.results[i][0].transcript;
                else interim += event.results[i][0].transcript;
            }

            if (interim !== '') document.getElementById('sub-display').innerText = interim;

            if (final !== '' && !isProcessing) {
                const result = event.results[0][0];
                
                // FILTRO DE CONFIANZA ALTO PARA EVITAR AUTO-RESPUESTAS
                if (result.confidence < 0.75) return; 

                isProcessing = true; // BLOQUEAR MICRO
                rec.stop();

                if (turn === 'client' && isAutoDetect) {
                    const det = await detectLanguageIA(final);
                    if (det) { targetLang = det; isAutoDetect = false; updateFlagUI(det); }
                }

                let translated = await translateIA(final, turn === 'driver' ? 'es' : targetLang, turn === 'driver' ? targetLang : 'es');
                
                if (translated) {
                    updateUI(translated, final, turn === 'driver' ? "client" : "driver");
                    speak(translated, turn === 'driver' ? getFullCode(targetLang) : 'es-ES', () => {
                        // AL TERMINAR DE HABLAR:
                        isProcessing = false;
                        turn = (turn === 'driver') ? 'client' : 'driver';
                        setTimeout(startCycle, 1000); // PAUSA DE SEGURIDAD
                    });
                } else {
                    isProcessing = false;
                    setTimeout(startCycle, 500);
                }
            }
        };

        async function detectLanguageIA(text) {
            try {
                const r = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=autodetect|es`);
                const d = await r.json();
                const l = d.responseData.detectedSourceLanguage;
                return ['en', 'fr', 'de', 'it'].includes(l) ? l : 'en';
            } catch { return null; }
        }

        async function translateIA(text, from, to) {
            try {
                const r = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`);
                const d = await r.json();
                return d.responseData.translatedText;
            } catch { return null; }
        }

        function speak(text, lang, onEnd) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = lang; u.rate = 0.9;
            u.onend = () => { setTimeout(onEnd, 500); }; // Delay extra post-voz
            window.speechSynthesis.speak(u);
        }

        async function forcePhrase(spanishText) {
            if(!isRunning) toggleSystem();
            if(isProcessing) return;
            isProcessing = true;
            rec.stop();
            const translatedText = await translateIA(spanishText, 'es', targetLang);
            updateUI(translatedText, spanishText, "client");
            speak(translatedText, getFullCode(targetLang), () => {
                isProcessing = false;
                turn = 'client';
                setTimeout(startCycle, 1000);
            });
        }

        function updateUI(main, sub, mode) {
            document.getElementById('app-body').className = "mode-" + mode;
            document.getElementById('main-display').innerText = main;
            document.getElementById('sub-display').innerText = sub;
        }

        function updateFlagUI(lang) {
            document.getElementById('btn-auto').classList.remove('active');
            document.querySelectorAll('.l-flag').forEach(b => b.classList.remove('active'));
            const f = document.getElementById('flag-' + lang);
            if(f) f.classList.add('active');
        }

        function getFullCode(l) { return { 'en': 'en-GB', 'fr': 'fr-FR', 'de': 'de-DE', 'it': 'it-IT' }[l]; }
        
        // REINICIO SEGURO DEL MICRÓFONO
        rec.onend = () => { 
            if(isRunning && !isProcessing && !window.speechSynthesis.speaking) {
                setTimeout(startCycle, 300);
            }
        };

        rec.onerror = (e) => { if(isRunning && e.error !== 'no-speech') setTimeout(startCycle, 1000); };
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
